apiVersion: apps/v1
kind: Deployment
metadata:
  name: webqa-fe
  namespace: webqa
  labels:
    app: webqa-fe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webqa-fe
  template:
    metadata:
      labels:
        app: webqa-fe
    spec:
      containers:
        - name: webqa-fe
          # Replace with your frontend image
          image: your-registry/webqa-fe:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: webqa-fe-svc
  namespace: webqa
spec:
  selector:
    app: webqa-fe
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
