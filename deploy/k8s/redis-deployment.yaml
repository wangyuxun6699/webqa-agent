apiVersion: apps/v1
kind: Deployment
metadata:
  name: webqa-redis
  namespace: webqa
  labels:
    app: webqa-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webqa-redis
  template:
    metadata:
      labels:
        app: webqa-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: webqa-redis
  namespace: webqa
spec:
  selector:
    app: webqa-redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
  type: ClusterIP
