apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: webqa-postgres
  namespace: webqa
  labels:
    app: webqa-postgres
spec:
  serviceName: webqa-postgres
  replicas: 1
  selector:
    matchLabels:
      app: webqa-postgres
  template:
    metadata:
      labels:
        app: webqa-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "webqa"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: webqa-secrets
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: webqa-secrets
                  key: DB_PASSWORD
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "webqa"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "webqa"]
            initialDelaySeconds: 5
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi

---
apiVersion: v1
kind: Service
metadata:
  name: webqa-postgres
  namespace: webqa
spec:
  selector:
    app: webqa-postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  clusterIP: None
