apiVersion: v1
kind: ConfigMap
metadata:
  name: webqa-config
  namespace: webqa
data:
  # -------------------------------------------------------
  # Database (use external DB or the bundled postgres below)
  # -------------------------------------------------------
  DB_HOST: "webqa-postgres"
  DB_PORT: "5432"
  DB_NAME: "webqa"

  # -------------------------------------------------------
  # Redis
  # -------------------------------------------------------
  REDIS_HOST: "webqa-redis"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  PROGRESS_CACHE_TTL: "43200"

  # -------------------------------------------------------
  # LLM Configuration
  # Replace with your own API endpoint and model list
  # -------------------------------------------------------
  LLM_API: "openai"
  LLM_BASE_URL: "https://api.openai.com/v1"
  LLM_AVAILABLE_MODELS: "gpt-4o-mini,gpt-4o"
  LLM_DEFAULT_MODEL: "gpt-4o-mini"

  # -------------------------------------------------------
  # Execution Control
  # -------------------------------------------------------
  JOB_TIMEOUT_SECONDS: "7200"
  MAX_CONCURRENT_JOBS: "5"
  DEFAULT_WORKERS: "1"
  MAX_WORKERS: "5"

  # Execution Mode: "local" for subprocess, "kubernetes" for K8s Jobs
  EXECUTION_MODE: "kubernetes"

  # -------------------------------------------------------
  # Shared Storage
  # -------------------------------------------------------
  SHARED_STORAGE_PATH: "/shared"
  SHARED_REPORTS_DIR: "reports"
  SHARED_LOGS_DIR: "logs"

  # -------------------------------------------------------
  # Backend Callback URL (K8s service name)
  # -------------------------------------------------------
  BACKEND_CALLBACK_URL: "http://webqa-be:8000"

  # -------------------------------------------------------
  # Kubernetes Job Configuration
  # -------------------------------------------------------
  K8S_NAMESPACE: "webqa"
  # Replace with your agent image (Docker Hub / GHCR / private registry)
  K8S_JOB_IMAGE: "your-registry/webqa-agent:latest"
  K8S_PVC_NAME: "webqa-pvc"
  K8S_JOB_SERVICE_ACCOUNT: "webqa-agent-sa"
